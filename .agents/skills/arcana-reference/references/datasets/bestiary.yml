    behavior: 'El consejero espiritual de la tribu, cubierto de fetiches y huesos. Evita
      el combate directo, prefiriendo potenciar a los guerreros más fuertes con gritos
      frenéticos y curar sus heridas con brebajes dudosos. Si se queda solo, lanzará
      fuego desesperadamente.

      '
