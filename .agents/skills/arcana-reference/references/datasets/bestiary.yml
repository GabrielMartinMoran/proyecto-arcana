          aliado goblin a distancia Inmediata, puede intercambiar lugares con el aliado.
          El aliado se convierte en el nuevo objetivo del ataque.
    interactions: []
    behavior: 'Más grande y cruel que el resto. Lidera desde atrás, disparando con una
      ballesta robada a un guardia y empujando a sus subordinados hacia el peligro.
      Su principal táctica de supervivencia es usar a otros goblins como escudos vivientes.
      Solo desenvaina la cimitarra si se ve acorralado.

      '
    img: https://i.imgur.com/KoSYgNz.jpeg
