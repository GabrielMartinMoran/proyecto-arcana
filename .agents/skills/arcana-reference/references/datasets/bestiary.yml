      - name: Arco Corto Improvisado
        bonus: 3
        damage: 1d4 Perforante
        note: Alcance Largo
    traits:
      - name: Visión en la Oscuridad
        detail: El goblin puede ver en penumbra como si fuera luz tenue y en oscuridad
          como si fuera penumbra (sombras grises) hasta distancia Cercana.
    actions: []
    reactions:
      - name: Retirada Cobarde
        detail: Cuando un enemigo falla un ataque cuerpo a cuerpo contra el goblin, este
          puede usar su Reacción para moverse hasta la mitad de su velocidad sin provocar
          ataques de oportunidad.
    interactions: []
    behavior: 'Una plaga cobarde y oportunista. Nunca lucha solo si puede evitarlo.
      Prioriza objetivos aislados, heridos o que parezcan fáciles de abrumar. Utiliza
      su agilidad para escaramuzas rápidas, atacando y reposicionándose. Su objetivo
      no es morir con honor, sino sobrevivir para saquear.

      '
    img: https://i.imgur.com/I3zy9zB.png
