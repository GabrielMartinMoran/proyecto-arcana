cards:
  - id: 247e65ba8308bdeea8b6b50f9ef031b41094c06a
    name: Furia de Batalla
    level: 1
    type: activable
    tags:
      - Coloso
    requirements: Sintonía con el Acero
    uses:
      type: LONG_REST
      qty: 2
    description: >-
      Entras en furia por 1 minuto o hasta que quedes inconsciente. Mientras dure la furia, ganas los siguientes
      efectos:<br> - **Temple de Hierro:** Ganas Mitigación Física +1 y ventaja en pruebas de habilidad de Cuerpo.<br> -
      **Presencia Imponente:** Tu imponente estado físico te permite usar tu puntuación de Cuerpo en lugar de tu
      puntuación de Presencia al realizar pruebas de habilidad de Intimidación.<br> - **Instinto Primordial:** Mientras
      dure la furia, no puedes pensar con claridad, mantener concentración ni usar cartas con la etiqueta _Conjuro_.<br>
      En caso de no recibir ninguna agresión o agredir a alguien durante una ronda, tu furia termina.
    slug: furia-de-batalla
