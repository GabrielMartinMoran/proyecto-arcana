  - id: 2e1d27c454ae1f42d91b4ca9feb8f9ad6d79db36
    name: Esquiva Sobrenatural
    level: 4
    type: efecto
    tags:
      - Pícaro
    requirements: Evasión & Reflejos 5
    uses:
      type: null
      qty: 0
    description: >-
      _Te mueves como un fantasma a través de la tormenta, dejando que los ataques te atraviesen mientras tú sigues
      avanzando incólume._<br><br> Ganas los siguientes beneficios:<br> - Tu carta Evasión ahora también se aplica a
