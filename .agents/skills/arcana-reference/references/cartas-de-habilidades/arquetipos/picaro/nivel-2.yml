cards:
  - id: b094eca7a67b3a7880212493c150513c3b14c637
    name: Acción Astuta
    level: 2
    type: activable
    tags:
      - Pícaro
    requirements: Senda del Bribón & Reflejos 3
    uses:
      type: null
      qty: 0
    description: >-
      _Tus reflejos están tan entrenados que correr o esconderte se han vuelto actos tan naturales como
      respirar._<br><br> Puedes usar tu Interacción de cada turno para realizar las acciones de Correr o Esconderse.
    slug: accion-astuta
  - id: fbb6a2e2532be6e948ae04150ce3a3f1c3e268f7
    name: Riposta
    level: 2
    type: activable
    tags:
      - Pícaro
      - Reacción
    requirements: Estilo Audaz & Reflejos 3
    uses:
      type: RELOAD
      qty: 4
    description: >-
      _Cada fallo de tu oponente es una invitación a que sienta el frío de tu acero en sus costillas._<br><br> Como
      Reacción, cuando un enemigo te falla un ataque cuerpo a cuerpo, puedes realizar un ataque cuerpo a cuerpo contra
      él con un arma Precisa.
    slug: riposta
  - id: 116c34f49d6d26cd839d5a6132fe302f34c85fbc
    name: Duelista Audaz
    level: 2
    type: efecto
    tags:
      - Pícaro
    requirements: Estilo Audaz & Reflejos 3
    uses:
      type: null
      qty: 0
    description: >-
      _Tu confianza es un escudo y tu mirada un arma; en un duelo singular, nadie puede igualar tu ingenio y
      vigor._<br><br> Ganas los siguientes beneficios:<br> - **Duelo de Ingenio:** Puedes aplicar tu Ataque Furtivo a
      una criatura aunque no tengas Ventaja, siempre que no haya ninguna otra criatura a 1 metro de ti o del
      objetivo.<br> - **Vigor del Duelista:** Cuando impactas a una criatura con un ataque cuerpo a cuerpo que cumple
      las condiciones de "Duelo de Ingenio", ganas una cantidad de Puntos de Salud temporales igual a tu puntuación de
      Presencia. Estos Puntos de Salud temporales duran 1 minuto.
    slug: duelista-audaz
  - id: 8301659b1880bd733b41ad1b2c7efee1b005063f
    name: Alquimia de Combate
    level: 2
    type: activable
    tags:
      - Pícaro
    requirements: Senda del Bribón & Mente 2
    uses:
      type: RELOAD
      qty: 5
    description: >-
      _Has aprendido a destilar la muerte en viales, aplicando toxinas que queman las venas de tus enemigos antes de que
      se den cuenta del corte._<br><br> Obtienes Ventaja (+1d4) en pruebas para preparar venenos.<br> Puedes aplicar
      veneno a un arma como una Interacción.<br> Cuando impactas a una criatura con un arma que no esta envenenada,
      puedes inyectar una toxina creada al instante. El objetivo debe superar una TS de Cuerpo (ND 5 + Mente). Si falla,
      eliges el efecto:<br> - **Toxina Virulenta:** El objetivo sufre el estado Envenenado hasta el final de tu próximo
      turno.<br> - **Toxina Agónica:** El objetivo sufre 1d6 de daño de Veneno adicional.<br>
    slug: alquimia-de-combate
  - id: 068fd34bc636bf59fb4ab6449c0b44202ce88bfe
    name: Asesinar
    level: 2
    type: efecto
    tags:
      - Pícaro
    requirements: Senda del Bribón & Reflejos 3
    uses:
      type: null
      qty: 0
    description: >-
      _Observas, esperas y golpeas; cuando tu víctima se da cuenta de que estás ahí, ya es demasiado tarde.._<br><br>
      Usas tu Interacción para preparar un ataque letal contra una criatura que no este consciente de tu presencia hasta
      el final de tu turno. Tu primer impacto con un arma contra esa criatura se considera automáticamente un golpe
      crítico.
    slug: asesinar
  - id: 02d4948b1d32228e3ce6ec4dbd0b02f54dfcec20
    name: Manos Rápidas
    level: 2
    type: efecto
    tags:
      - Pícaro
    requirements: Senda del Bribón & Reflejos 3
    uses:
      type: null
      qty: 0
    description: >-
      _Tus dedos operan con una velocidad que desafía la física, permitiéndote usar objetos y herramientas en mitad del
      caos sin perder el ritmo._<br><br> Puedes usar tu Interacción para realizar la acción de Usar un Objeto, incluso
      aquellos que normalmente requerirían una Acción para activarse.
    slug: manos-rapidas
