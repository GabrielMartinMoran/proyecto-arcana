cards:
  - id: 66bbd30050d3211a8b388b088fde1408895dd73a
    name: Paso Sombrío Letal
    level: 5
    type: activable
    tags:
      - Pícaro
    requirements: Asesinar & Reflejos 6
    uses:
      type: RELOAD
      qty: 8
    description: >-
      _Te fundes con la oscuridad y reapareces en el punto más débil de tu enemigo para asestar el golpe de
      gracia._<br><br> Como Interacción, te fundes con las sombras y reapareces instantáneamente en un espacio
      desocupado a distancia Cercana. Inmediatamente después, puedes realizar un único ataque con arma cuerpo a cuerpo
      contra una criatura adyacente. Este ataque se realiza con Ventaja (+1d4). Si impactas, puedes usar tu _Ataque
      Furtivo_, y su daño se maximiza.
    slug: paso-sombrio-letal
  - id: 22ebd754635741069ef9fa03a0cf5bfdb95bd9f5
    name: Golpe Fantasma
    level: 5
    type: activable
    tags:
      - Pícaro
    requirements: Ataque Furtivo Mejorado & Reflejos 6
    uses:
      type: RELOAD
      qty: 8
    description: >-
      _Tu ataque trasciende las defensas materiales; ni la armadura más gruesa ni los escudos mágicos pueden proteger a
      tu objetivo de tu precisión._<br><br> Como Acción, realizas un único ataque con un arma Precisa o a distancia.
      Este ataque ignora toda Mitigación Física, Mitigación Mágica y Puntos de Salud temporales del objetivo. Si
      impactas, puedes usar tu _Ataque Furtivo_, y su daño se maximiza.
    slug: golpe-fantasma
  - id: 8c00a0217146f26727777666732a671f2168b4a1
    name: Ataque Furtivo Maestro
    level: 5
    type: efecto
    tags:
      - Pícaro
    requirements: Golpe Letal & Reflejos 6
    uses:
      type: null
      qty: 0
    description: >-
      _Tu letalidad es una leyenda; un solo roce de tu hoja es una sentencia de muerte que nadie puede evitar._<br><br>
      El daño adicional de tu Ataque Furtivo aumenta a 6d4.
    slug: ataque-furtivo-maestro
