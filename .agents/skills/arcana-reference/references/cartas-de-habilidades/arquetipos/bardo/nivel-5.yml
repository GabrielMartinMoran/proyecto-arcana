cards:
  - id: 5c268125127f96a9dcaa5dbfc7612983a952a98d
    name: Sinfonía Heroica
    level: 5
    type: efecto
    tags:
      - Bardo
    requirements: Canto de Héroes & Presencia 6
    uses:
      type: null
      qty: 0
    description: >-
      _Tu obra maestra resuena en todo el campo de batalla, inspirando y coordinando a múltiples héroes con un solo y
      majestuoso compás._<br><br> Cuando usas tu _Canto de Inspiración_, puedes inspirar a dos aliados a la vez.<br>
      Todos los demás beneficios asociados a tu inspiración se aplican a ambos objetivos por igual.
    slug: sinfonia-heroica
  - id: 72e63e24590d9449b602b176d78da616d1e0d040
    name: Canción de la Creación
    level: 5
    type: activable
    tags:
      - Bardo
      - Conjuro
      - Ritual
    requirements: Secretos Mágicos & Presencia 6
    uses:
      type: LONG_REST
      qty: 1
    description: >-
      _Tu música es tan perfecta que trasciende la simple ilusión, solidificando la materia a partir del mismísimo
      silencio._<br> Tras 10 minutos de interpretación ininterrumpida, tejes una ilusión semi-real y duradera a partir
      de la música. Eliges uno de los siguientes efectos:<br> - **Crear Materia:** Creas un objeto no mágico que puede
      ocupar hasta un cubo de 10 metros de lado (como una casa pequeña o un puente de piedra). El objeto se ve y se
      siente real ante una inspección superficial. Sin embargo, puede ser identificado como una creación mágica mediante
      efectos de Visión Verdadera o realizando una inspección física exhaustiva superando una Prueba de Percepción vs
      (ND 5 + Presencia). El objeto es sólido y su duración se mantiene hasta ser disipado.<br> - **Reescribir
      Memoria:** Alteras permanentemente la memoria de una criatura sobre un evento específico. Si el objetivo no es
      voluntario, debe superar una Tirada de Salvación de Instinto (ND 5 + Presencia) para evitar el efecto.
    slug: cancion-de-la-creacion
  - id: 85fde679c3d7f84c9507b2b0fde60e3ac869ed35
    name: Danza de Magia y Acero
    level: 5
    type: efecto
    tags:
      - Bardo
    requirements: Floritura Ofensiva & Presencia 6
    uses:
      type: null
      qty: 0
    description: >-
      _Has alcanzado la cúspide del combate artístico, donde cada corte de tu espada sirve como el componente somático
      de un poderoso hechizo._<br><br> Cuando utilizas tu carta _Floritura Ofensiva_, puedes optar por lanzar un conjuro
      de Nivel 1 o 2 (con tiempo de lanzamiento de una Acción) en lugar de realizar el segundo ataque con arma.<br> El
      conjuro elegido debe poseer las etiquetas _Bardo_ y _Conjuro_ (ambas), o haber sido aprendido mediante la carta
      _Secretos Mágicos_.
    slug: danza-de-magia-y-acero
