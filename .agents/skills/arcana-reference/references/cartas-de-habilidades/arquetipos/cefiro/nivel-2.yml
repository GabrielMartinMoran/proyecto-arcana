cards:
  - id: 6677020e6dd7f6fa0ff1e33431ddcff520c0519b
    name: Precisión Letal
    level: 2
    type: activable
    tags:
      - Céfiro
    requirements: Sintonía Fluida & Reflejos 3
    uses:
      type: RELOAD
      qty: 4
    description: >-
      Tu paciencia y puntería te permiten realizar disparos y estocadas imposibles.<br> Mientras tengas esta carta
      activa, si no has gastado nada de tu movimiento durante tu turno, puedes sacrificarlo para obtener un +1 a tus
      tiradas de ataque con armas Precisas, a distancia y arrojadizas hasta el final de tu turno.<br> Como Acción,
      puedes gastar un uso de esta carta para realizar un único ataque con una de estas armas. Si impacta, el golpe
      ignora toda la Mitigación Física del objetivo.
    slug: precision-letal
