      Obtienes Ventaja (+1d4) en Pruebas de Acrobacias y Supervivencia.<br><br> **Beneficio de Arquetipo:** Adquieres la
      carta _Maestría Marcial_ y usas Reflejos como tu Atributo Marcial. Tu Salud máxima aumenta en +5. Además, ignoras
