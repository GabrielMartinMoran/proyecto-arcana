cards:
  - id: 88b234b2894c0f8fd683481992f7be0b014182da
    name: Sangre Mágica
    level: 1
    type: efecto
    tags:
      - Hechicero
    requirements: Herencia Sobrenatural
    uses:
      type: null
      qty: 0
    description: >-
      Una vez por ronda, puedes sacrificar vitalidad (daño directo no mitigable) para alterar tus conjuros de
      _Arcanista_:<br> - **Sacrificio:** Cuando fallas una Recarga, puedes pagar **3 PS por cada punto** que quieras
      sumar al resultado.<br> - **Potencia:** Al tirar daño, puedes pagar **2 PS por nivel del conjuro** para volver a
      tirar un número de dados igual a tu **Presencia**.<br> - **Celeridad:** Puedes lanzar un conjuro de Nivel 1 o 2
      usando tu **Interacción**. El coste es 3 + nivel del conjuro de daño.<br>
    slug: sangre-magica
  - id: 2bfe0e47046da80a8ce040852ab0d28418c840c1
    name: Ráfaga Inestable
    level: 1
    type: activable
    tags:
      - Hechicero
      - Conjuro
    requirements: Herencia Sobrenatural
    uses:
      type: RELOAD
      qty: 3
    description: >-
      Realizas un ataque de conjuro (1d8 + Atributo Arcano) a distancia Cercana contra un objetivo. Si impactas,
      infliges 1d6 de daño de Fuerza.<br> - **Cascada Menor:** Si el dado de daño resulta en un "6" natural, la energía
      se desborda: tiras 1d6 adicional y lo sumas al daño total. Este dado también puede explotar si saca un 6.
    slug: rafaga-inestable
