    description: >-
      La magia arcana fluye por tu sangre, es parte de tu herencia.<br><br> Obtienes Ventaja (+1d4) en pruebas de
      **Persuasión** e **Intimidación**.<br> Adquieres la carta _Afinidad Arcana_, y puedes usar Presencia como tu
      Atributo Arcano para las cartas de _Arcanista_.<br> <br> **Beneficio de Arquetipo:** <br> - **Uno con la Magia:**
      Mientras este sea tu Beneficio de Arquetipo activo, añades la carta _Sangre Mágica_ a tu colección.<br>
      Adicionalmente, tu Salud máxima aumenta en +3, aprendes un idioma (asociado con tu fuente de magia) y ganas un
      bono a tus Puntos de Salud igual a 5 PS por cada 10 PP que hayas gastado.<br><br>
