    name: Visiones del Patrón
    level: 2
    type: efecto
    tags:
      - Brujo
    requirements: Pacto Supremo & Presencia 3
    uses:
      type: null
      qty: 0
    description: >-
      _Los ojos de tu patrón te permiten ver donde otros están ciegos, y su voz oscura te guía cuando buscas
      respuestas._<br><br> Puedes ver normalmente en oscuridad, incluso si es oscuridad mágica.<br> Además, una vez por
      día de descanso, puedes gastar 1 Punto de Suerte y tomarte 1 minuto para hacerle una pregunta directa a tu Patrón.
      El DJ te dará una respuesta veraz, aunque frecuentemente críptica o interesada.
    slug: visiones-del-patron
