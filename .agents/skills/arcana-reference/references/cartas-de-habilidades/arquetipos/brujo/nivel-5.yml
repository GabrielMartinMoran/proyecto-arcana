cards:
  - id: b45728a62ac4ac13e42a676ab395b54b22781c8f
    name: Consumación del Pacto
    level: 5
    type: activable
    tags:
      - Brujo
    requirements: Pacto Supremo & Presencia 6
    uses:
      type: LONG_REST
      qty: 1
    description: >-
      Eres la extensión terrenal absoluta de tu señor extraplanar.<br> Una vez por día de descanso, como Acción, abres
      un conducto directo hacia el dominio de tu patrón.<br> Tu _Descarga Sobrenatural_ se dispara simultáneamente
      contra hasta un número de enemigos igual a tu puntuación de Presencia a distancia Larga, realizando una tirada de
      ataque individual para cada uno.<br> Además, los objetivos que resulten impactados quedan marcados por la
      fatalidad: la próxima vez que fallen una Tirada de Salvación o reciban un ataque antes del final de tu próximo
      turno, sufrirán el máximo daño posible de ese efecto.
    slug: consumacion-del-pacto
  - id: c9e46453cbacf0254d2d14d41e6a92e5c31dcfcb
    name: Tajo de Aniquilación
    level: 5
    type: activable
    tags:
      - Brujo
    requirements: Danza Eldritch & Presencia 6
    uses:
      type: LONG_REST
      qty: 1
    description: >-
      Como Acción, realizas un único y devastador ataque cuerpo a cuerpo con tu _Arma del Pacto_. Este golpe ignora toda
      la Mitigación Mágica y Física del objetivo. Si impactas, el objetivo sufre el daño normal del arma más 8d8 de daño
      adicional (del mismo tipo de tu _Descarga Sobrenatural_).<br> Además, la energía profana sella sus heridas
      temporalmente: el objetivo no puede recuperar Puntos de Salud de ninguna forma hasta el final de tu próximo turno.
    slug: tajo-de-aniquilacion
  - id: 377f80de418a3ed79c26aedd9c41862d42260071
    name: Palabra del Más Allá
    level: 5
    type: activable
    tags:
      - Brujo
    requirements: Revelación del Abismo & Presencia 6
    uses:
      type: LONG_REST
      qty: 1
    description: >-
      El grimorio contiene la clave de todas las realidades atadas a tu señor.<br> Una vez por día de descanso, como
      Acción, puedes leer una página de tu tomo y lanzar cualquier carta de _Conjuro_ de Nivel 4 o inferior que
      pertenezca a la misma lista de clase que elegiste para tu _Grimorio de las Sombras_, incluso si no la tienes en tu
      Colección. Este lanzamiento no requiere componentes y usa Presencia como atributo de lanzamiento.<br> -
      **Resonancia Conocida:** Si eliges lanzar un conjuro que ya posees en tus Ranuras de Cartas Activas, lanzar el
      mismo conjuro a través del grimorio no agota tu otra carta.
    slug: palabra-del-mas-alla
  - id: 594f8e4cea290118e36a0edbb9f3852cfde3d9bc
    name: Avatar del Patrón
    level: 5
    type: activable
    tags:
      - Brujo
    requirements: Entidad Desatada & Presencia 6
    uses:
      type: LONG_REST
      qty: 1
    description: >-
      Como Interacción, canalizas el poder crudo de tu patrón hacia tu familiar durante 1 minuto.<br> El familiar
      aumenta a tamaño Grande y el daño de su Detonación sube a 5d8.<br> - **Canalizador Autónomo:** Mientras este
      efecto dure, una vez por turno, cuando usas tu Acción para lanzar un conjuro, tu familiar puede desatar de forma
      simultánea e independiente una _Descarga Sobrenatural_ desde su posición hacia un objetivo válido, usando tu
      Presencia para la tirada de ataque.
    slug: avatar-del-patron
