cards:
  - id: 95fa5f50b8cd6761f817cbbae610b53d5d91d8f2
    name: Escudo de Sombras
    level: 3
    type: activable
    tags:
      - Brujo
      - Reacción
    requirements: Pacto Supremo & Presencia 4
    uses:
      type: RELOAD
      qty: 5
    description: >-
      _Invocas la protección de tu Patrón para amortiguar el golpe y castigar al agresor con energía oscura._<br><br>
      Como Reacción, cuando eres impactado por un ataque de una criatura que puedas ver, reduces el daño de ese ataque a
      la mitad.<br> Además, si el atacante se encuentra a distancia Inmediata de ti, sufre daño del tipo de tu _Descarga
      Sobrenatural_ igual al valor de tu Atributo Arcano.
    slug: escudo-de-sombras
  - id: b0471bea3d96fe003b0b216956fc0a6cec03b6c9
    name: Manifestación del Patrón
    level: 3
    type: activable
    tags:
      - Brujo
      - Conjuro
    requirements: Pacto Supremo & Atributo Arcano 4
    uses:
      type: RELOAD
      qty: 6
    description: >-
      _Abres una brecha hacia el dominio de tu Patrón, inundando la realidad con su aterradora esencia y sus
      anomalías._<br><br> Elije un punto a distancia Media, inundando una esfera de 3 metros de radio con una descarga
      de poder de tu patrón.<br> Todas las criaturas en el área deben superar una TS de Instinto (ND 5 + Atributo
      Arcano).<br> Si fallan, reciben 4d6 de daño del mismo tipo que tu _Descarga Sobrenatural_ y sufren una anomalía
      según el tipo de daño hasta el final de tu próximo turno:<br> - **Eléctrico:** Sobrecarga nerviosa; no pueden usar
      Reacciones.<br> - **Frío:** Escarcha paralizante; su Velocidad se reduce a la mitad.<br> - **Fuego:** Cenizas
      ardientes; reciben 1d6 de daño extra al inicio de su próximo turno.<br> - **Fuerza:** Impacto cinético; son
      empujadas 2 metros lejos del centro y quedan Derribadas.<br> - **Necrótico:** Marchitamiento; no pueden recuperar
      Puntos de Salud de ninguna forma.<br> - **Psíquico:** Terror incomprensible; quedan en el estado Asustado por
      ti.<br> - **Radiante:** Destello cegador; quedan en el estado Cegado.<br> Si tienen éxito en la salvación, reciben
      la mitad del daño y no sufren el efecto secundario.
    slug: manifestacion-del-patron
  - id: 66c3ff794c53fa19ed55fda4ee18d03d0f618f04
    name: Danza Sobrenatural
    level: 3
    type: activable
    tags:
      - Brujo
    requirements: Arma del Pacto & Presencia 4
    uses:
      type: RELOAD
      qty: 5
    description: >-
      _Cada corte de tu arma debilita la mente y el cuerpo del enemigo, dejandolo vulnerabla a tus sortilegios._<br><br>
      Mientras tengas esta carta activa, cuando impactas a un enemigo con tu _Arma del Pacto_, el objetivo sufre
      Desventaja (-1d4) en la próxima Tirada de Salvación que realice contra uno de tus conjuros de Brujo o Arcanista
      antes del final de tu próximo turno.<br> Además, cuando usas tu Acción para lanzar un conjuro de _Arcanista_ o
      _Brujo_ de Nivel 1 o 2, puedes gastar el uso de esta carta para usar tu Interacción en ese mismo turno y realizar
      un único ataque cuerpo a cuerpo con tu _Arma del Pacto_.
    slug: danza-sobrenatural
  - id: fe84a8e9dad92d8eb0ae0c24a21e461d67273212
    name: Revelación del Abismo
    level: 3
    type: efecto
    tags:
      - Brujo
    requirements: Grimorio de las Sombras & Presencia 4
    uses:
      type: null
      qty: 0
    description: >-
      _Tu mente se expande para asimilar horrores y conjuros aún mayores provenientes de tu grimorio oscuro._<br><br>
      Eliges una carta de _Conjuro_ de Nivel 3 de la misma lista que te otorgó tu _Grimorio de las Sombras_. Esta carta
      se añade a tu colección bajo las mismas reglas.<br> - **Reescritura Pagana:** Ahora, si inviertes una semana
      entera de tiempo entre aventuras dedicado al estudio exhaustivo, puedes reemplazar una o varias de las cartas
      otorgadas por este pacto por otras válidas de sus niveles correspondientes.
    slug: revelacion-del-abismo
  - id: 0dd8d6104294f87abe7db1b392d31878a48d0afa
    name: Entidad Desatada
    level: 3
    type: efecto
    tags:
      - Brujo
    requirements: Familiar Inescrutable & Presencia 4
    uses:
      type: null
      qty: 0
    description: >-
      _La esencia de tu familiar se condensa, volviéndolo más resistente y nutriendo sus capacidades ofensivas._<br><br>
      La Salud máxima de tu familiar pasa a ser igual a tres veces tu puntuación de Presencia, y el daño de su
      Detonación aumenta a 3d8.<br> - **Azote en Movimiento:** Al usar la acción de Desplazamiento de tu familar, si al
      finalizar este se encuentra a distancia Inmediata de una criatura a la que hayas atacado en este turno, el
      familiar desata un latigazo de energía inestable. Realizas un ataque de conjuro cuerpo a cuerpo usando tu
      Presencia. Si impactas, infliges 1d8 de daño del mismo tipo que tu _Descarga Sobrenatural_.
    slug: entidad-desatada
