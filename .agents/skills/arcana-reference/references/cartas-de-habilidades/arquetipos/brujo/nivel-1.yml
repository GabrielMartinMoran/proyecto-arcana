cards:
  - id: ec5171ce351b6776c507d506c15060bea439a384
    name: Descarga Sobrenatural
    level: 1
    type: activable
    tags:
      - Brujo
      - Conjuro
    requirements: Pacto Supremo
    uses:
      type: null
      qty: 0
    description: >-
      _Canalizas el poder puro de tu patrón en un proyectil ineludible y letal._<br><br> Al añadir esta carta a tu
      colección, elige un tipo de daño permanente que depende de tu patrón: Eléctrico, Frío, Fuego, Fuerza, Necrótico,
      Psíquico o Radiante.<br> Realizas un ataque de conjuro (1d8 + Presencia) a distancia Media. Si impactas, infliges
      1d8 de daño del tipo elegido.<br><br> _Esta carta solo puede ser adquirida a través de Pacto Supremo._
    slug: descarga-sobrenatural
  - id: 4cf21a50db10f2367f93d9252d51c315a3f84f91
    name: Arma del Pacto
    level: 1
    type: efecto
    tags:
      - Brujo
    requirements: Pacto Supremo
    uses:
      type: null
      qty: 0
    description: >-
      _Materializas un arma forjada con energía inestable, atada eternamente a tu voluntad y a la de tu Patrón._<br><br>
      Elije un arma que poseas y sintonizala con el poder de tu patrón:<br> - **Llamada Ineludible:** Como Interacción,
      materializas el arma en tu mano libre. Si la pierdes, puedes usar tu Interacción para que se desvanezca y
      reaparezca instantáneamente en tu agarre, sin importar la distancia. - **Poder Sobrenatural**: Usas tu puntuación
      de Presencia para las tiradas de ataque. Además, puedes reemplazar el dado de daño base original del arma por 1d8
      del tipo de tu _Descarga Sobrenatural_.
    slug: arma-del-pacto
  - id: 3174348aa65716d65e0f8cfc0de8d5d9638a4d0a
    name: Grimorio de las Sombras
    level: 1
    type: efecto
    tags:
      - Brujo
    requirements: Pacto Supremo
    uses:
      type: null
      qty: 0
    description: >-
      _Un tomo oscuro obsequiado por tu Patrón, repleto de secretos mágicos solo disponibles para otras
      disciplinas._<br><br> Elige dos cartas de _Conjuro_ de Nivel 1 de las listas de Sacerdote, Druida o Bardo (la
      lista dependerá del dominio de tu patrón). Estas cartas se añaden a tu Colección, ignoran tu restricción de _Celos
      del Patrón_, se consideran como cartas de _Brujo_ para tí, y usas Presencia para utlizarlas en lugar del atributo
      que indique la carta.<br> - **Conocimiento Sellado:** Esta elección es inmutable y no puedes cambiar estas cartas
      a voluntad.
    slug: grimorio-de-las-sombras
  - id: 844a363ca2a18898ef6ee73cbf87ee001b2fa7f4
    name: Familiar Inescrutable
    level: 1
    type: efecto
    tags:
      - Brujo
    requirements: Pacto Supremo
    uses:
      type: null
      qty: 0
    description: >-
      _Invocas a un emisario menor y perturbador que te sirve como compañero, espía, conducto arcano y trampa
      letal._<br><br> Tras un ritual de 10 minutos, invocas a un emisario menor de tu patrón. Su Salud es igual a tu
      puntuación de Presencia, y su Esquiva es 5 + tu puntuación de Presencia. Posee una Velocidad de vuelo igual a 4 +
      tu puntuación de Presencia. Flota a tu lado, obedece órdenes telepáticas y ganas estos beneficios:<br> -
      **Desplazamiento:** Como Interacción, puedes ordenar a tu familiar que se mueva hasta su Velocidad total a un
      punto que puedas ver.<br> - **Vigía:** Mientras esté a distancia Larga o inferior, compartes sus sentidos
      perfectamente sin usar acciones.<br> - **Conducto Eldritch:** Puedes lanzar tu _Descarga Sobrenatural_
      originándola desde el espacio que ocupa el familiar en lugar del tuyo.<br> - **Detonación:** Si el familiar llega
      a 0 Puntos de Salud, explota. Las criaturas a distancia Inmediata de él deben superar una TS de Reflejos (ND 5 +
      Presencia) o sufrir 1d8 de daño (del tipo de tu _Descarga Sobrenatural_).
    slug: familiar-inescrutable
