cards:
  - id: c4d26bf4557258252efab5c292dc04ebdc68e63b
    name: Fórmula del Archimago
    level: 5
    type: activable
    tags:
      - Mago
    requirements: Estudios Mágicos & Mente 6
    uses:
      type: LONG_REST
      qty: 1
    description: >-
      Has descifrado el código fuente de la realidad y el cenit del estudio arcano es tuyo.<br> Una vez por día de
      descanso, puedes usar tu Acción para alterar la Urdimbre a tu conveniencia.<br> Eliges cualquier carta de Conjuro
      de Arcanista que poseas en tu Colección (incluso si no está equipada en tus Ranuras de Cartas Activas) y la lanzas
      instantáneamente. Este lanzamiento magistral no requiere componentes verbales ni somáticos, no gasta su uso de
      Recarga, y maximiza una de las tiradas de dados de la carta.
    slug: formula-del-archimago
