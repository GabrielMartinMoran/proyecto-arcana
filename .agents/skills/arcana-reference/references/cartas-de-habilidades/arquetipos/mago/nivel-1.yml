cards:
  - id: 291f05dbd232bd397efb1e6bd24bccfda245cf5f
    name: Grimorio de Preparación
    level: 1
    type: efecto
    tags:
      - Mago
    requirements: Estudios Mágicos
    uses:
      type: null
      qty: 0
    description: >-
      Tu libro de estudio te permite adaptarte a los obstáculos.<br> Una vez por día de descanso, durante un momento de
      calma, puedes dedicar 10 minutos a estudiar. Al hacerlo, puedes intercambiar hasta dos de tus cartas con las
      etiquetas _Conjuro_ y _Arcanista_ (ambas) activas por otras de tu Colección.<br> Además, el tiempo de lanzamiento
      de tus conjuros de _Ritual_ para conjuros de _Arcanista_ se reduce a la mitad (5 minutos).
    slug: grimorio-de-preparacion
  - id: 6f133b879fb8b2e50cb8dce1f455e2b0fb65b0c0
    name: Proyectiles Mágicos
    level: 1
    type: activable
    tags:
      - Mago
      - Conjuro
    requirements: Estudios Mágicos
    uses:
      type: RELOAD
      qty: 3
    description: >-
      Creas dos dardos de energía arcana que persiguen a sus objetivos a distancia Cercana.<br> Los dardos no pueden
      fallar. Puedes dirigirlos al mismo objetivo o a objetivos distintos. Cada dardo inflige 1d4 de daño de Fuerza.<br>
      - **Concentración de Poder:** Si diriges ambos proyectiles al mismo objetivo, suma sus resultados antes de que el
      enemigo aplique su Mitigación Mágica.
    slug: proyectiles-magicos
