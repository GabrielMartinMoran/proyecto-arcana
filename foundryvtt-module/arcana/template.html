<div
	class="arcana-sheet {{cssClass}}"
	style="
		height: 100%;
		display: flex;
		flex-direction: column;
		padding: 0;
		margin: 0;
		overflow: hidden;
	"
>
	{{#if isBestiary}}
	<div
		class="bestiary-controls"
		style="padding: 5px 8px; border-bottom: 2px groove #444; flex: 0 0 auto"
	>
		<div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px">
			<div style="display: flex; align-items: center; gap: 3px" title="Vida Local del Token">
				<i class="fas fa-heart" style="color: #ff4444; text-shadow: 1px 1px 2px black"></i>
				<input
					type="number"
					name="system.health.value"
					value="{{health.value}}"
					placeholder="Cur"
					style="width: 50px; text-align: center; height: 24px"
				/>
				<span style="font-weight: bold; opacity: 0.7">/</span>
				<input
					type="number"
					name="system.health.max"
					value="{{health.max}}"
					placeholder="Max"
					style="width: 50px; text-align: center; height: 24px"
				/>
			</div>

			<div
				style="
					flex-grow: 1;
					text-align: center;
					font-weight: bold;
					font-family: var(--font-primary);
					opacity: 0.8;
					text-transform: uppercase;
					font-size: 0.8em;
				"
			>
				Estado del Token
			</div>
		</div>

		<div style="display: flex; gap: 5px; align-items: flex-start">
			<i
				class="fas fa-sticky-note"
				style="color: #ebc857; margin-top: 5px; text-shadow: 1px 1px 2px black"
				title="Notas Locales"
			></i>
			<textarea
				name="flags.arcana.localNotes"
				rows="2"
				placeholder="Notas de combate (Estados, Loot, etc)..."
				style="flex-grow: 1; resize: vertical; min-height: 30px; font-size: 0.9em; padding: 4px"
			>
{{localNotes}}</textarea
			>
		</div>

		{{#if hasNpcAbilityUsage}}
		<div
			class="npc-ability-usage-section npc-ability-usage-compact"
			style="margin-top: 6px; display: flex; flex-wrap: wrap; align-items: flex-start; gap: 8px"
		>
			{{#each npcAbilityGroups}}
			<section
				style="
					flex: 1 1 calc((100% - 16px) / 3);
					min-width: 220px;
					box-sizing: border-box;
					display: flex;
					flex-direction: column;
					justify-content: space-between;
				"
				class="npc-ability-group npc-ability-group-compact"
				data-npc-ability-group="{{source}}"
			>
				<h4 style="margin: 2px 0; font-size: 1rem">{{label}}</h4>
				{{#each abilities}}
				<div
					class="npc-ability-row npc-ability-row-compact"
					data-ability-id="{{id}}"
					style="display: flex; flex-wrap: wrap; align-items: center; gap: 4px 6px"
				>
					<span class="npc-ability-name" style="flex: 1 1 140px">{{name}}</span>
					<div
						class="npc-ability-controls-inline"
						style="display: flex; flex-wrap: wrap; align-items: center; gap: 4px"
					>
						<button type="button" data-npc-ability-action="use" data-ability-id="{{id}}">
							Usar
						</button>
						<input
							type="number"
							data-npc-ability-control="current"
							data-ability-id="{{id}}"
							value="{{current}}"
							min="0"
							max="{{max}}"
							style="width: 44px; text-align: center"
						/>
						<span style="font-size: 1.1rem" data-ability-display="{{id}}">/{{max}}</span>
						{{#if isRecharge}}
						<button type="button" data-npc-ability-action="recharge" data-ability-id="{{id}}">
							Recarga
						</button>
						{{/if}}
					</div>
				</div>
				{{/each}}
			</section>
			{{/each}}
		</div>
		{{/if}}
	</div>
	{{/if}} {{#if iframeUrl}}
	<div style="flex-grow: 1; position: relative; width: 100%; height: 100%">
		<iframe
			src="{{iframeUrl}}"
			style="width: 100%; height: 100%; border: none; display: block"
			sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
			allow="clipboard-write"
		>
		</iframe>
	</div>
	{{else}}
	<div
		style="
			flex-grow: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			opacity: 0.5;
			text-align: center;
		"
	>
		<i class="fas fa-unlink" style="font-size: 4em; margin-bottom: 20px"></i>
		<h2>Sin Conexión</h2>
		<p>Configura la URL.</p>
	</div>
	{{/if}}
</div>
